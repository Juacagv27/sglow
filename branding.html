<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proceso de Branding | Sglow Studio</title>

<link rel="stylesheet" href="css/branding.css">
<link rel="stylesheet" href="https://use.typekit.net/mhz2sbd.css">

</head>

<body>

    <header>
        <div class="tech-blob"></div>
<div class="tech-blob-2"></div>

    <div class="nav-container">
        <div class="nav-pill">
            <div class="nav-logo">
                <img src="imagenes/icon_1.png" alt="sglow"> </div>
            <nav class="nav-links">
                <a href="https://sglow.com.co/">Inicio</a>
                <a href="https://sglow.com.co/#nosotros">Nosotros</a>
            </nav>
            <div class="nav-actions">
                <a href="https://sglow.com.co/#servicios" class="btn-signin">Servicios</a>
                <a href="https://wa.me/573122334296" class="btn-waitlist">Contáctanos</a>
            </div>
        </div>
    </div>
</header>

	<section class="brand-map">

<h2 class="map-title">Brand Journey</h2>

<div class="map-container">

<!-- LOGO -->
<div class="node completed" id="n1" data-unlocks="n2,n5" style="top:50px; left:45%">
    <span>ADN & <br> Estrategia</span>
</div>

<!-- IDENTIDAD -->
<div class="node active" id="n2" data-unlocks="n3,n4" style="top:220px; left:20%">
    <span>Identidad</span>
</div>

<div class="node locked" id="n3" style="top:380px; left:10%">
    <span>Manual <br> de marca</span>
</div>

<div class="node locked" id="n4" style="top:380px; left:30%">
    <span>Ecosistema <br> Digital</span>
</div>

<!-- BRANDING -->
<div class="node locked" id="n5" data-unlocks="n6,n7" style="top:220px; left:70%">
    <span>Posicionamiento</span>
</div>

<div class="node locked" id="n6" style="top:380px; left:60%">
    <span>Gestión de <br> Contenidos</span>
</div>

<div class="node locked" id="n7" style="top:380px; left:80%">
    <span>Analítica</span>
</div>

</div>

<div class="progress-wrapper">

<p>Progreso de tu marca</p>

<div class="progress-bar">
<div class="progress-fill"></div>
</div>

<p class="progress-text">0%</p>

</div>

<div class="node-info" id="nodeInfo">
<h3 id="nodeTitle"></h3>
<p id="nodeText"></p>
</div>

</section>
	 <script src="js/brand_script.js"></script>

</body>
</html>
